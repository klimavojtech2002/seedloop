# Release channel: a version tag builds, verifies, and publishes via PyPI trusted publishing
# (OIDC) — no stored token. Publish is unreachable unless the gates job passes: GitHub has no
# cross-workflow job dependency, so the gate the publish jobs `need` lives in this workflow
# (ci.yml still runs the full OS/Python matrix on the same tag push, in parallel).
# An rc tag (v0.3.2rc1) publishes to TestPyPI — the rehearsal; a final tag (v0.3.2) to PyPI.

name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  gates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
      - name: Install
        run: python -m pip install -e ".[dev]"
      - name: Lint
        run: ruff check .
      - name: Format
        run: ruff format --check .
      - name: Types
        run: mypy .
      - name: Tests
        run: pytest -q
      - name: Demo
        run: python -m seedloop.demos.raft

  build:
    needs: gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Build and check
        run: |
          python -m pip install build twine
          python -m build
          twine check --strict dist/*
      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  publish-testpypi:
    # rc tags rehearse the channel end to end against TestPyPI; nothing reaches production.
    if: contains(github.ref_name, 'rc')
    needs: build
    runs-on: ubuntu-latest
    environment: testpypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  publish-pypi:
    if: ${{ !contains(github.ref_name, 'rc') }}
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
