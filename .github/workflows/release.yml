# Release channel: a version tag builds, verifies, and publishes via PyPI trusted publishing
# (OIDC) — no stored token. Publish is unreachable unless the gates job passes: GitHub has no
# cross-workflow job dependency, so the gate the publish jobs `need` lives in this workflow
# (ci.yml still runs the full OS/Python matrix and the mutation gate on the same tag push, in
# parallel; the convention is to tag only a commit already green on main).
#
# The build job reconciles the tag with the built version (scripts/release_guard.py) and picks the
# index from the version itself, not the tag spelling: a pre-release (aN/bN/rcN or a .dev segment)
# goes to TestPyPI — the rehearsal — and a final or .post release to PyPI. A tag that does not name
# the built version fails the build, so no publish job runs.

name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

concurrency:
  # Serialise releases; never cancel an in-flight upload.
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  gates:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
      - name: Install
        run: python -m pip install -e ".[dev]"
      - name: Lint
        run: ruff check .
      - name: Format
        run: ruff format --check .
      - name: Types
        run: mypy .
      - name: Tests
        run: pytest -q
      - name: Demo
        run: python -m seedloop.demos.raft

  build:
    needs: gates
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      channel: ${{ steps.guard.outputs.channel }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Build and check
        run: |
          python -m pip install build twine packaging
          python -m build
          twine check --strict dist/*
      - name: Guard the tag and pick the channel
        id: guard
        run: |
          version="$(ls dist/*.whl | sed -E 's|.*/seedloop-([^-]+)-py3-none-any\.whl|\1|')"
          python scripts/release_guard.py "${{ github.ref_name }}" "$version"
      - name: Smoke-test the built wheel
        # Install the shipped artifact into a clean venv — proves the wheel runs, not just the source.
        run: |
          python -m venv /tmp/smoke
          /tmp/smoke/bin/python -m pip install dist/*.whl
          /tmp/smoke/bin/python -c "import seedloop"
          /tmp/smoke/bin/python -m seedloop.demos.raft
      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  publish-testpypi:
    # A pre-release rehearses the channel end to end against TestPyPI; nothing reaches production.
    if: needs.build.outputs.channel == 'testpypi'
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: testpypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          repository-url: https://test.pypi.org/legacy/

  publish-pypi:
    if: needs.build.outputs.channel == 'pypi'
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
