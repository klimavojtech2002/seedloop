name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gates:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install
        run: python -m pip install -e ".[dev]"
      - name: Lint
        run: ruff check .
      - name: Format
        run: ruff format --check .
      - name: Types
        run: mypy .
      - name: Tests
        run: pytest -q
      - name: Demo
        run: python -m seedloop.demos.raft

  mutation:
    # Prove the tests catch broken behaviour, not just that they are green: mutate the library and
    # fail on any survivor not in the reviewed equivalent-mutant baseline. The survivor set is stable
    # per platform, but OS-branching code (the hash-seed launcher) is exercised differently per OS, so
    # the gate runs on the platform the baseline was generated and reviewed on (see ADR-0019).
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
      - name: Install
        run: python -m pip install -e ".[dev,mutation]"
      - name: Types (harness)
        run: mypy scripts/mutation_sweep.py scripts/release_guard.py scripts/pin_replay.py
      - name: Mutation gate
        run: python scripts/mutation_sweep.py
